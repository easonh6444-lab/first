<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S3 Storage Hub — Feature 3</title>
    <meta name="description" content="AWS S3 檔案上傳與下載管理介面">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☁️</text></svg>">
    <style>
        /* ── Reset & Base ─────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-dark:      #050811;
            --glass-bg:     rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.10);
            --cyan:         #00f2fe;
            --purple:       #a855f7;
            --pink:         #ff0090;
            --green:        #00e676;
            --orange:       #ff9800;
            --red:          #ff4444;
            --text-primary: #e8eaf6;
            --text-muted:   rgba(232,234,246,0.55);
            --font-main:    'Inter', sans-serif;
            --font-display: 'Outfit', sans-serif;
            --radius-lg:    18px;
            --radius-md:    12px;
            --radius-sm:    8px;
            --transition:   0.25s cubic-bezier(0.4,0,0.2,1);
        }

        html, body {
            min-height: 100vh;
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 15px;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ── Ambient background orbs ──────────────────────────────── */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.18;
            pointer-events: none;
            animation: drift 18s ease-in-out infinite alternate;
        }
        .orb-1 { width: 520px; height: 520px; background: radial-gradient(circle, #00f2fe, transparent); top: -120px; left: -120px; animation-duration: 20s; }
        .orb-2 { width: 420px; height: 420px; background: radial-gradient(circle, #a855f7, transparent); bottom: -80px; right: -80px; animation-duration: 26s; animation-direction: alternate-reverse; }
        .orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, #ff0090, transparent); top: 45%; left: 55%; animation-duration: 16s; }
        @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,40px) scale(1.08); } }

        /* ── Layout ───────────────────────────────────────────────── */
        .page-container {
            position: relative;
            max-width: 960px;
            margin: 0 auto;
            padding: 28px 20px 60px;
            z-index: 1;
        }

        /* ── Glass card ───────────────────────────────────────────── */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 28px;
        }

        /* ── Header ───────────────────────────────────────────────── */
        .page-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }
        .header-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            padding: 6px 12px;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            transition: var(--transition);
        }
        .header-back:hover { color: var(--cyan); border-color: var(--cyan); }
        .header-title { flex: 1; }
        .header-title h1 {
            font-family: var(--font-display);
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-title p { color: var(--text-muted); font-size: 13px; margin-top: 2px; }
        .s3-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: rgba(0,242,254,0.06);
            border: 1px solid rgba(0,242,254,0.2);
            border-radius: 20px;
            font-size: 12px;
            color: var(--cyan);
        }
        .s3-badge .dot { width:7px; height:7px; border-radius:50%; background:var(--cyan); animation: pulse-dot 2s ease-in-out infinite; }
        @keyframes pulse-dot { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,242,254,.5)} 50%{opacity:.7;box-shadow:0 0 0 5px rgba(0,242,254,0)} }

        /* ── Section titles ───────────────────────────────────────── */
        .section-title {
            font-family: var(--font-display);
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }

        /* ── Upload zone ──────────────────────────────────────────── */
        .upload-card { margin-bottom: 24px; }
        .drop-zone {
            border: 2px dashed rgba(168,85,247,0.35);
            border-radius: var(--radius-md);
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .drop-zone::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(168,85,247,0.04) 0%, transparent 70%);
            opacity: 0;
            transition: var(--transition);
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--purple);
            background: rgba(168,85,247,0.07);
        }
        .drop-zone:hover::before, .drop-zone.dragover::before { opacity: 1; }
        .drop-icon { font-size: 48px; margin-bottom: 14px; display: block; }
        .drop-primary { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
        .drop-secondary { font-size: 13px; color: var(--text-muted); }
        .drop-secondary span { color: var(--purple); cursor: pointer; text-decoration: underline; }
        #file-input { display: none; }

        /* Progress bar */
        .upload-progress-wrap {
            margin-top: 20px;
            display: none;
        }
        .upload-progress-wrap.visible { display: block; }
        .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
        .progress-bar-track {
            height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 99px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--purple), var(--cyan));
            border-radius: 99px;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Upload button */
        .upload-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 18px;
            flex-wrap: wrap;
        }
        .selected-file-name {
            flex: 1;
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .selected-file-name.has-file { color: var(--cyan); }

        /* ── Buttons ──────────────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-family: var(--font-main);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: var(--transition);
            outline: none;
            white-space: nowrap;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--purple), #7c3aed);
            color: #fff;
            box-shadow: 0 4px 20px rgba(168,85,247,0.3);
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 28px rgba(168,85,247,0.45);
        }
        .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
        .btn-secondary {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.10); color: var(--text-primary); }
        .btn-danger {
            background: rgba(255,68,68,0.12);
            border: 1px solid rgba(255,68,68,0.25);
            color: var(--red);
            padding: 6px 12px;
        }
        .btn-danger:hover { background: rgba(255,68,68,0.22); }
        .btn-download {
            background: rgba(0,242,254,0.10);
            border: 1px solid rgba(0,242,254,0.25);
            color: var(--cyan);
            padding: 6px 12px;
        }
        .btn-download:hover { background: rgba(0,242,254,0.18); }

        /* ── File list ────────────────────────────────────────────── */
        .files-card { }
        .files-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .search-input-wrap {
            flex: 1;
            min-width: 160px;
            position: relative;
        }
        .search-input-wrap .icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; }
        .search-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 13px;
            padding: 8px 12px 8px 34px;
            outline: none;
            transition: var(--transition);
        }
        .search-input:focus { border-color: rgba(0,242,254,0.4); background: rgba(255,255,255,0.07); }
        .search-input::placeholder { color: var(--text-muted); }

        /* Files table */
        .files-table-wrap { overflow-x: auto; }
        .files-table {
            width: 100%;
            border-collapse: collapse;
        }
        .files-table th {
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--text-muted);
            padding: 10px 14px;
            border-bottom: 1px solid var(--glass-border);
        }
        .files-table td {
            padding: 12px 14px;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            vertical-align: middle;
        }
        .files-table tr:last-child td { border-bottom: none; }
        .files-table tbody tr { transition: background var(--transition); }
        .files-table tbody tr:hover { background: rgba(255,255,255,0.04); }

        .file-name-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .file-icon { font-size: 20px; flex-shrink: 0; }
        .file-name { font-weight: 500; color: var(--text-primary); }
        .file-key { font-size: 11px; color: var(--text-muted); margin-top: 1px; font-family: monospace; }
        .file-size { color: var(--text-muted); font-size: 12px; font-family: monospace; }
        .file-date { color: var(--text-muted); font-size: 12px; white-space: nowrap; }
        .file-actions { display: flex; gap: 8px; }

        /* Empty / loader states */
        .table-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
        }
        .table-state .state-icon { font-size: 40px; margin-bottom: 12px; display: block; }
        .table-state p { font-size: 14px; }

        .spinner {
            width: 28px; height: 28px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Toast notifications ──────────────────────────────────── */
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 14px 18px;
            border-radius: var(--radius-md);
            backdrop-filter: blur(20px);
            font-size: 13px;
            max-width: 340px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            animation: slide-in 0.3s ease forwards;
            border: 1px solid var(--glass-border);
        }
        @keyframes slide-in { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }
        .toast.success { background: rgba(0,230,118,0.12); border-color: rgba(0,230,118,0.25); }
        .toast.error   { background: rgba(255,68,68,0.12);  border-color: rgba(255,68,68,0.25); }
        .toast.info    { background: rgba(0,242,254,0.10);  border-color: rgba(0,242,254,0.25); }
        .toast-icon { font-size: 16px; flex-shrink: 0; }
        .toast-body { flex: 1; }
        .toast-title { font-weight: 600; margin-bottom: 2px; }
        .toast-msg { color: var(--text-muted); }
        .toast-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 0; line-height: 1; }
        .toast-close:hover { color: var(--text-primary); }

        /* ── Responsive ───────────────────────────────────────────── */
        @media (max-width: 600px) {
            .page-header { flex-wrap: wrap; }
            .s3-badge { display: none; }
            .files-table th:nth-child(3),
            .files-table td:nth-child(3) { display: none; }
        }
    </style>
</head>
<body>
    <!-- Ambient orbs -->
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <div class="page-container">

        <!-- Header -->
        <div class="page-header">
            <a href="/" class="header-back">← 返回主頁</a>
            <div class="header-title">
                <h1>☁️ S3 Storage Hub</h1>
                <p>Feature 3 — AWS S3 檔案上傳 &amp; 下載管理</p>
            </div>
            <div class="s3-badge">
                <span class="dot"></span>
                <span id="bucket-label">ckc101-13 · ap-northeast-1</span>
            </div>
        </div>

        <!-- Upload Section -->
        <div class="glass-card upload-card">
            <div class="section-title">📤 上傳檔案</div>

            <div class="drop-zone" id="drop-zone">
                <span class="drop-icon">📁</span>
                <p class="drop-primary">拖曳檔案到這裡</p>
                <p class="drop-secondary">或 <span id="browse-btn">點擊瀏覽</span> 選擇檔案</p>
                <input type="file" id="file-input" multiple>
            </div>

            <div class="upload-progress-wrap" id="upload-progress-wrap">
                <div class="progress-label">
                    <span id="progress-filename">上傳中...</span>
                    <span id="progress-pct">0%</span>
                </div>
                <div class="progress-bar-track">
                    <div class="progress-bar-fill" id="progress-bar"></div>
                </div>
            </div>

            <div class="upload-actions">
                <span class="selected-file-name" id="selected-file-name">尚未選擇檔案</span>
                <button class="btn btn-secondary" id="clear-btn" style="display:none">✕ 清除</button>
                <button class="btn btn-primary" id="upload-btn" disabled>
                    <span>🚀</span> 上傳到 S3
                </button>
            </div>
        </div>

        <!-- File List Section -->
        <div class="glass-card files-card">
            <div class="section-title">📂 S3 Bucket 檔案列表</div>

            <div class="files-toolbar">
                <div class="search-input-wrap">
                    <span class="icon">🔍</span>
                    <input type="text" class="search-input" id="search-input" placeholder="搜尋檔案名稱...">
                </div>
                <button class="btn btn-secondary" id="refresh-btn">🔄 重新整理</button>
            </div>

            <div class="files-table-wrap">
                <table class="files-table">
                    <thead>
                        <tr>
                            <th>檔案名稱</th>
                            <th>大小</th>
                            <th>最後修改</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="files-tbody">
                        <tr>
                            <td colspan="4">
                                <div class="table-state">
                                    <div class="spinner"></div>
                                    <p>載入檔案列表中...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div><!-- /page-container -->

    <script>
    // ── Utilities ────────────────────────────────────────────────────────────
    function formatBytes(bytes) {
        if (!bytes || bytes === 0) return '—';
        const units = ['B', 'KB', 'MB', 'GB'];
        let i = 0;
        while (bytes >= 1024 && i < units.length - 1) { bytes /= 1024; i++; }
        return bytes.toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
    }

    function formatDate(iso) {
        if (!iso) return '—';
        return new Date(iso).toLocaleString('zh-TW', {
            year:'numeric', month:'2-digit', day:'2-digit',
            hour:'2-digit', minute:'2-digit'
        });
    }

    function fileIcon(name) {
        const ext = (name.split('.').pop() || '').toLowerCase();
        const map = {
            pdf:'📄', png:'🖼️', jpg:'🖼️', jpeg:'🖼️', gif:'🖼️', svg:'🖼️', webp:'🖼️',
            mp4:'🎬', mov:'🎬', avi:'🎬', mkv:'🎬',
            mp3:'🎵', wav:'🎵', flac:'🎵',
            zip:'🗜️', gz:'🗜️', tar:'🗜️', rar:'🗜️',
            py:'🐍', js:'📜', html:'🌐', css:'🎨', json:'📋',
            csv:'📊', xlsx:'📊', xls:'📊',
            txt:'📝', md:'📝', doc:'📝', docx:'📝',
        };
        return map[ext] || '📦';
    }

    // ── Toast ────────────────────────────────────────────────────────────────
    function showToast(type, title, msg, duration = 4000) {
        const icons = { success: '✅', error: '❌', info: 'ℹ️' };
        const el = document.createElement('div');
        el.className = `toast ${type}`;
        el.innerHTML = `
            <span class="toast-icon">${icons[type] || 'ℹ️'}</span>
            <div class="toast-body">
                <div class="toast-title">${title}</div>
                <div class="toast-msg">${msg}</div>
            </div>
            <button class="toast-close" onclick="this.closest('.toast').remove()">×</button>`;
        document.getElementById('toast-container').appendChild(el);
        setTimeout(() => el.remove(), duration);
    }

    // ── Drag & Drop + File picker ─────────────────────────────────────────────
    const dropZone   = document.getElementById('drop-zone');
    const fileInput  = document.getElementById('file-input');
    const browseBtn  = document.getElementById('browse-btn');
    const uploadBtn  = document.getElementById('upload-btn');
    const clearBtn   = document.getElementById('clear-btn');
    const selectedLabel = document.getElementById('selected-file-name');
    let selectedFiles = [];

    browseBtn.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('click', (e) => { if (!e.target.closest('#browse-btn')) fileInput.click(); });

    ['dragenter','dragover'].forEach(evt => {
        dropZone.addEventListener(evt, e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    });
    ['dragleave','drop'].forEach(evt => {
        dropZone.addEventListener(evt, e => { e.preventDefault(); dropZone.classList.remove('dragover'); });
    });
    dropZone.addEventListener('drop', e => {
        const files = Array.from(e.dataTransfer.files);
        if (files.length) setFiles(files);
    });
    fileInput.addEventListener('change', () => {
        if (fileInput.files.length) setFiles(Array.from(fileInput.files));
    });

    function setFiles(files) {
        selectedFiles = files;
        selectedLabel.textContent = files.length === 1
            ? files[0].name
            : `${files.length} 個檔案已選取`;
        selectedLabel.classList.add('has-file');
        uploadBtn.disabled = false;
        clearBtn.style.display = '';
    }

    clearBtn.addEventListener('click', () => {
        selectedFiles = [];
        fileInput.value = '';
        selectedLabel.textContent = '尚未選擇檔案';
        selectedLabel.classList.remove('has-file');
        uploadBtn.disabled = true;
        clearBtn.style.display = 'none';
        document.getElementById('upload-progress-wrap').classList.remove('visible');
    });

    // ── Upload ────────────────────────────────────────────────────────────────
    uploadBtn.addEventListener('click', async () => {
        if (!selectedFiles.length) return;
        uploadBtn.disabled = true;

        const progressWrap = document.getElementById('upload-progress-wrap');
        const progressBar  = document.getElementById('progress-bar');
        const progressPct  = document.getElementById('progress-pct');
        const progressFile = document.getElementById('progress-filename');

        progressWrap.classList.add('visible');

        for (let i = 0; i < selectedFiles.length; i++) {
            const file = selectedFiles[i];
            progressFile.textContent = file.name;

            const formData = new FormData();
            formData.append('file', file);

            // Fake progress animation while awaiting
            let fakeProgress = 0;
            const fakeTimer = setInterval(() => {
                fakeProgress = Math.min(fakeProgress + 3, 85);
                progressBar.style.width = fakeProgress + '%';
                progressPct.textContent = fakeProgress + '%';
            }, 80);

            try {
                const res = await fetch('/api/s3/upload', { method: 'POST', body: formData });
                clearInterval(fakeTimer);
                const data = await res.json();
                if (res.ok) {
                    progressBar.style.width = '100%';
                    progressPct.textContent = '100%';
                    showToast('success', '上傳成功', `${file.name} 已儲存至 S3`);
                } else {
                    throw new Error(data.error || '上傳失敗');
                }
            } catch (err) {
                clearInterval(fakeTimer);
                showToast('error', '上傳失敗', err.message);
            }

            await new Promise(r => setTimeout(r, 500));
        }

        // Reset
        uploadBtn.disabled = false;
        clearBtn.click();
        loadFiles();
    });

    // ── File list ─────────────────────────────────────────────────────────────
    let allFiles = [];

    async function loadFiles() {
        const tbody = document.getElementById('files-tbody');
        tbody.innerHTML = `<tr><td colspan="4"><div class="table-state"><div class="spinner"></div><p>載入中...</p></div></td></tr>`;
        try {
            const res = await fetch('/api/s3/list');
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || '無法取得檔案列表');
            allFiles = data.files || [];
            renderFiles(allFiles);
        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="4"><div class="table-state"><span class="state-icon">⚠️</span><p>${err.message}</p></div></td></tr>`;
        }
    }

    function renderFiles(files) {
        const tbody = document.getElementById('files-tbody');
        if (!files.length) {
            tbody.innerHTML = `<tr><td colspan="4"><div class="table-state"><span class="state-icon">☁️</span><p>Bucket 是空的，上傳第一個檔案吧！</p></div></td></tr>`;
            return;
        }
        tbody.innerHTML = files.map(f => `
            <tr>
                <td>
                    <div class="file-name-cell">
                        <span class="file-icon">${fileIcon(f.key)}</span>
                        <div>
                            <div class="file-name">${escapeHtml(f.key.split('/').pop())}</div>
                            <div class="file-key">${escapeHtml(f.key)}</div>
                        </div>
                    </div>
                </td>
                <td><span class="file-size">${formatBytes(f.size)}</span></td>
                <td><span class="file-date">${formatDate(f.last_modified)}</span></td>
                <td>
                    <div class="file-actions">
                        <button class="btn btn-download" onclick="downloadFile('${escapeHtml(f.key)}')">⬇ 下載</button>
                        <button class="btn btn-danger"   onclick="deleteFile('${escapeHtml(f.key)}')">🗑</button>
                    </div>
                </td>
            </tr>`).join('');
    }

    function escapeHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Search
    document.getElementById('search-input').addEventListener('input', e => {
        const q = e.target.value.toLowerCase();
        renderFiles(allFiles.filter(f => f.key.toLowerCase().includes(q)));
    });

    document.getElementById('refresh-btn').addEventListener('click', () => {
        showToast('info', '重新整理', '重新載入檔案列表...');
        loadFiles();
    });

    // ── Download ──────────────────────────────────────────────────────────────
    async function downloadFile(key) {
        showToast('info', '產生下載連結', key);
        try {
            const res = await fetch(`/api/s3/download-url?key=${encodeURIComponent(key)}`);
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || '無法取得下載連結');
            // Open presigned URL in new tab
            window.open(data.url, '_blank');
        } catch (err) {
            showToast('error', '下載失敗', err.message);
        }
    }

    // ── Delete ────────────────────────────────────────────────────────────────
    async function deleteFile(key) {
        if (!confirm(`確定要刪除 "${key}"？`)) return;
        try {
            const res = await fetch('/api/s3/delete', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || '刪除失敗');
            showToast('success', '已刪除', key);
            loadFiles();
        } catch (err) {
            showToast('error', '刪除失敗', err.message);
        }
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    loadFiles();
    </script>
</body>
</html>
